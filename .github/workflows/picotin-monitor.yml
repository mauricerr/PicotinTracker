name: Picotin monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: picotin-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PICOTIN_CACHE_PATH: .state/picotin_seen.json
      PICOTIN_SCREENSHOT_DIR: artifacts/screenshots
      PICOTIN_LOG_PATH: logs/picotin-monitor.log
      PICOTIN_DEDUPE_HOURS: "6"
      PICOTIN_HEADLESS: "true"
      PICOTIN_SECONDARY_COLORS: "false"
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Restore dedupe cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: picotin-dedupe-${{ github.run_id }}
          restore-keys: |
            picotin-dedupe-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Prepare state directory
        run: mkdir -p .state

      - name: Run monitor
        run: python -m picotin_monitor.cli

      - name: Save dedupe cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: picotin-dedupe-${{ github.run_id }}
